<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>ᴳᴿメʙʟᴏᴏᴅʟɪɴᴇ Name Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #f5f5f5;
      --text-color: #111;
      --container-bg: #ffffff;
      --accent-color: #10a37f;
      --input-bg: #ffffff;
      --input-border: #e0e0e0;
    }

    [data-theme='dark'] {
      --bg-color: #101010;
      --text-color: #e2e2e2;
      --container-bg: #1c1c1c;
      --accent-color: #10a37f;
      --input-bg: #2b2b2b;
      --input-border: #444;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      height: 100%;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      width: 100%;
      max-width: 700px;
      background-color: var(--container-bg);
      border-radius: 16px;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
      margin: 2rem;
    }

    h1 {
      text-align: center;
      font-weight: 600;
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .input-wrapper {
      position: relative;
      width: 100%;
    }

    input {
      width: 100%;
      font-size: 1rem;
      padding: 0.9rem 3rem 0.9rem 1rem;
      border-radius: 1rem;
      border: 1px solid var(--input-border);
      background-color: var(--input-bg);
      color: var(--text-color);
      outline: none;
    }

    .action-button {
      position: absolute;
      right: 0.5rem;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      color: var(--text-color);
      border: none;
      padding: 0.5rem;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: transform 0.2s ease;
    }

    .action-button:hover {
      transform: translateY(-50%) scale(1.1);
    }

    #result {
      margin-top: 1.5rem;
      font-size: 1.6rem;
      color: var(--accent-color);
      text-align: center;
      opacity: 0;
      transition: opacity 0.4s ease;
      cursor: pointer;
      user-select: all;
    }

    .note {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #888;
      text-align: center;
    }

    .symbol-box {
      margin-top: 1.5rem;
      padding: 0.5rem 1rem;
      border: 1px dashed var(--text-color);
      border-radius: 0.5rem;
      text-align: center;
      font-size: 1rem;
      user-select: all;
      cursor: pointer;
    }

    .theme-toggle {
      margin-top: 2rem;
      text-align: center;
    }

    .theme-icon {
      font-size: 1.3rem;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .theme-icon:hover {
      transform: rotate(20deg);
    }

    .credit {
      margin-top: 1rem;
      font-size: 1rem;
      text-align: center;
      font-weight: 600;
      color: #ff5e5e;
      animation: colorChange 2s infinite alternate;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .credit-label {
      font-size: 1rem;
      color: #bbb;
      margin-right: 0.5rem;
    }

    .credit-name {
      font-size: 1rem;
      font-weight: 600;
      animation: colorChange 2s infinite alternate;
    }

    @keyframes colorChange {
      0% {
        color: #10a37f;
      }
      50% {
        color: #f5a623;
      }
      100% {
        color: #e94e77;
      }
    }

    .copied-message {
      margin-top: 1.5rem;
      font-size: 1rem;
      color: var(--accent-color);
      text-align: center;
      display: none;
    }

    @media (max-width: 600px) {
      .container {
        margin: 1rem;
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ᴳᴿメʙʟᴏᴏᴅʟɪɴᴇ Name Generator</h1>

    <div class="input-wrapper">
      <input type="text" id="nameInput" maxlength="7" placeholder="Enter name (max 7 characters)" aria-label="Name Input">
      <button class="action-button" id="actionBtn" onclick="handleAction()">✨</button>
    </div>

    <div id="result"></div>
    <div class="note">Your generated name will include a random one-digit symbol. Max 12 characters total.</div>
    <div class="symbol-box" onclick="copyInvisible()">Invisible Symbol: ㅤ</div>
    <div class="copied-message" id="copiedMessage">Copied!</div>

    <div class="theme-toggle">
      <span class="theme-icon" onclick="toggleTheme()">🌓</span>
    </div>

    <div class="credit">
      <span class="credit-label">📎 Powered by</span>
      <span class="credit-name">ᴳᴿᴮメʟᴏᴠᴇʀღ</span>
    </div>
  </div>

  <script>
    const smallCapsMap = {
      a: 'ᴀ', b: 'ʙ', c: 'ᴄ', d: 'ᴅ', e: 'ᴇ', f: 'ꜰ', g: 'ɢ',
      h: 'ʜ', i: 'ɪ', j: 'ᴊ', k: 'ᴋ', l: 'ʟ', m: 'ᴍ', n: 'ɴ',
      o: 'ᴏ', p: 'ᴘ', q: 'ꞯ', r: 'ʀ', s: 'ꜱ', t: 'ᴛ', u: 'ᴜ',
      v: 'ᴠ', w: 'ᴡ', x: 'ᴧ', y: 'ʏ', z: 'ᴢ',
      0: '₀', 1: '₁', 2: '₂', 3: '₃', 4: '₄',
      5: '₅', 6: '₆', 7: '₇', 8: '₈', 9: '₉'
    };

    const symbols = ['༒', '☬', '☆', '★', '❀', '™', '→', '✿', '§', '۝', '❖', '⁂', '©', '‱', '☞', '☟', '☜', '♬', '♫', '♪', 'ღ', '†', '‡', '‿', '╭', '╯', '╮', '╰', '₰', 'ヅ', 'ノ', 'ミ', 'ン', '｠', '｟', '〆', '々', '〙', '〘', '』', '『', '๓', '๒', 'ჯ', 'ᚸ', 'ᛃ', '៚'];

    let currentSymbol = '';
    let baseName = '';
    let isGenerated = false;

    function toSmallCaps(input) {
      return input.toLowerCase().split('').map(c => smallCapsMap[c] || '').join('');
    }

    function handleAction() {
      if (!isGenerated) {
        generateName();
      } else {
        changeSymbol();
      }
    }

    function generateName() {
      const input = document.getElementById('nameInput').value.trim();
      if (input.length === 0 || input.length > 7) {
        alert("Please enter a name with 1–7 characters.");
        return;
      }

      baseName = `ᴳᴿᴮメ${toSmallCaps(input)}`;
      currentSymbol = getRandomSymbol();
      updateResult();
      isGenerated = true;
      document.getElementById('actionBtn').innerText = '♻️';
    }

    function changeSymbol() {
      currentSymbol = getRandomSymbol();
      updateResult();
    }

    function updateResult() {
      const resultEl = document.getElementById('result');
      resultEl.innerText = baseName + currentSymbol;
      resultEl.style.opacity = 1;
    }

    function getRandomSymbol() {
      return symbols[Math.floor(Math.random() * symbols.length)];
    }

    document.getElementById('result').addEventListener('click', () => {
      const name = document.getElementById('result').innerText;
      if (!name) return;

      navigator.clipboard.writeText(name).then(() => {
        document.getElementById('actionBtn').innerText = '✨';
        isGenerated = false;
        // Optional: show subtle feedback
        document.getElementById('result').innerText = 'Copied!';
        setTimeout(() => {
          updateResult();
        }, 1000);
      });
    });

    function copyInvisible() {
      const tempInput = document.createElement('input');
      tempInput.value = 'ㅤ';
      document.body.appendChild(tempInput);
      tempInput.select();
      document.execCommand('copy');
      document.body.removeChild(tempInput);
      
      // Show the "Copied!" message
      const copiedMessage = document.getElementById('copiedMessage');
      copiedMessage.style.display = 'block';
      setTimeout(() => {
        copiedMessage.style.display = 'none';
      }, 2000);
    }

    function setTheme(mode) {
      document.documentElement.setAttribute('data-theme', mode);
      localStorage.setItem('theme', mode);
    }

    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      setTheme(newTheme);
    }

    const stored = localStorage.getItem('theme');
    if (stored) {
      setTheme(stored);
    } else {
      const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
      setTheme(prefersLight ? 'light' : 'dark');
    }
  </script>
</body>
</html>
