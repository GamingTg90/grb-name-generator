<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>бҙібҙҝгғЎКҷКҹбҙҸбҙҸбҙ…КҹЙӘЙҙбҙҮ Name Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-color: #f5f5f5;
      --text-color: #111;
      --container-bg: #ffffff;
      --accent-color: #10a37f;
      --input-bg: #ffffff;
      --input-border: #e0e0e0;
    }

    [data-theme='dark'] {
      --bg-color: #101010;
      --text-color: #e2e2e2;
      --container-bg: #1c1c1c;
      --accent-color: #10a37f;
      --input-bg: #2b2b2b;
      --input-border: #444;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      height: 100%;
    }

    /* Disable text selection on everything except input */
    body,
    button,
    .symbol-box,
    #result {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      width: 100%;
      max-width: 700px;
      background-color: var(--container-bg);
      border-radius: 16px;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.1);
      margin: 2rem;
    }

    h1 {
      text-align: center;
      font-weight: 600;
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      -webkit-user-select: text;
      user-select: text;
    }

    .input-wrapper {
      position: relative;
      width: 100%;
    }

    input {
      width: 100%;
      font-size: 1rem;
      padding: 0.9rem 3rem 0.9rem 1rem;
      border-radius: 1rem;
      border: 1px solid var(--input-border);
      background-color: var(--input-bg);
      color: var(--text-color);
      outline: none;
      user-select: text;
    }

    .action-button {
      position: absolute;
      right: 0.5rem;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      color: var(--text-color);
      border: none;
      padding: 0.5rem;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      line-height: 1;
      transition: transform 0.2s ease;
      user-select: none;
    }

    .action-button:hover {
      transform: translateY(-50%) scale(1.1);
    }

    #result {
      margin-top: 1.5rem;
      font-size: 1.6rem;
      color: var(--accent-color);
      text-align: center;
      opacity: 0;
      transition: opacity 0.4s ease;
      cursor: pointer;
      user-select: none;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #result .base-name {
      user-select: none;
    }

    #result .symbol {
      user-select: none;
      display: inline-block;
    }

    .note {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #888;
      text-align: center;
      user-select: none;
    }

    .symbol-box {
      margin-top: 1.5rem;
      padding: 0.5rem 1rem;
      border: 1px dashed var(--text-color);
      border-radius: 0.5rem;
      text-align: center;
      font-size: 1rem;
      user-select: none;
      cursor: pointer;
    }

    .theme-toggle {
      margin-top: 2rem;
      text-align: center;
      user-select: none;
    }

    .theme-icon {
      font-size: 1.3rem;
      cursor: pointer;
      transition: transform 0.3s ease;
      user-select: none;
    }

    .theme-icon:hover {
      transform: rotate(20deg);
    }

    .credit {
      margin-top: 1rem;
      font-size: 1rem;
      text-align: center;
      font-weight: 600;
      color: #ff5e5e;
      animation: colorChange 2s infinite alternate;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
    }

    .credit-label {
      font-size: 1rem;
      color: #bbb;
      margin-right: 0.5rem;
    }

    .credit-name {
      font-size: 1rem;
      font-weight: 600;
      animation: colorChange 2s infinite alternate;
    }

    @keyframes colorChange {
      0% {
        color: #10a37f;
      }
      50% {
        color: #f5a623;
      }
      100% {
        color: #e94e77;
      }
    }

    .copied-message {
      margin-top: 1.5rem;
      font-size: 1rem;
      color: var(--accent-color);
      text-align: center;
      display: none;
      user-select: none;
    }

    /* Animate symbol fade out and in */
    .fade-out {
      animation: fadeOut 0.3s forwards;
    }

    .fade-in {
      animation: fadeIn 0.3s forwards;
    }

    @keyframes fadeOut {
      from {
        opacity: 1;
        transform: translateY(0);
      }
      to {
        opacity: 0;
        transform: translateY(-10px);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      .container {
        margin: 1rem;
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>бҙібҙҝгғЎКҷКҹбҙҸбҙҸбҙ…КҹЙӘЙҙбҙҮ Name Generator</h1>

    <div class="input-wrapper">
      <input
        type="text"
        id="nameInput"
        maxlength="7"
        placeholder="Enter name (max 7 characters)"
        aria-label="Name Input"
      />
      <button class="action-button" id="actionBtn" onclick="handleAction()">вңЁ</button>
    </div>

    <div id="result" aria-live="polite" aria-atomic="true" role="region">
      <!-- base name and symbol inserted dynamically -->
    </div>
    <div class="note">Your generated name will include a random one-digit symbol. Max 12 characters total.</div>
    <div class="symbol-box" onclick="copyInvisible()">Invisible Symbol: г…Ө</div>
    <div class="copied-message" id="copiedMessage">Copied!</div>

    <div class="theme-toggle">
      <span class="theme-icon" onclick="toggleTheme()">рҹҢ“</span>
    </div>

    <div class="credit">
      <span class="credit-label">рҹ“Һ Powered by</span>
      <span class="credit-name">бҙібҙҝбҙ®гғЎКҹбҙҸбҙ бҙҮКҖбғҰ</span>
    </div>
  </div>

  <script>
    const smallCapsMap = {
      a: 'бҙҖ',
      b: 'Кҷ',
      c: 'бҙ„',
      d: 'бҙ…',
      e: 'бҙҮ',
      f: 'кң°',
      g: 'Йў',
      h: 'Кң',
      i: 'ЙӘ',
      j: 'бҙҠ',
      k: 'бҙӢ',
      l: 'Кҹ',
      m: 'бҙҚ',
      n: 'Йҙ',
      o: 'бҙҸ',
      p: 'бҙҳ',
      q: 'кһҜ',
      r: 'КҖ',
      s: 'кңұ',
      t: 'бҙӣ',
      u: 'бҙң',
      v: 'бҙ ',
      w: 'бҙЎ',
      x: 'бҙ§',
      y: 'КҸ',
      z: 'бҙў',
      0: 'вӮҖ',
      1: 'вӮҒ',
      2: 'вӮӮ',
      3: 'вӮғ',
      4: 'вӮ„',
      5: 'вӮ…',
      6: 'вӮҶ',
      7: 'вӮҮ',
      8: 'вӮҲ',
      9: 'вӮү',
    };

    const symbols = [
      'ај’', 'вҳ¬', 'вҳҶ', 'вҳ…', 'вқҖ', 'в„ў', 'вҶ’', 'вңҝ', 'В§', 'Ық', 'вқ–', 'вҒӮ', 'В©', 'вҖұ',
      'вҳһ', 'вҳҹ', 'вҳң', 'вҷ¬', 'вҷ«', 'вҷӘ', 'бғҰ', 'вҖ ', 'вҖЎ', 'вҖҝ', 'в•ӯ', 'в•Ҝ', 'в•®', 'в•°',
      'вӮ°', 'гғ…', 'гғҺ', 'гғҹ', 'гғі', 'пҪ ', 'пҪҹ', 'гҖҶ', 'гҖ…', 'гҖҷ', 'гҖҳ', 'гҖҸ', 'гҖҺ',
      'а№“', 'а№’', 'бғҜ', 'бҡё', 'бӣғ', 'бҹҡ'
    ];

    let currentSymbol = '';
    let baseName = '';
    let isGenerated = false;

    function toSmallCaps(input) {
      return input.toLowerCase().split('').map(c => {
        if (c === ' ') return 'г…Ө'; // Replace space with invisible symbol
        return smallCapsMap[c] || '';
      }).join('');
    }

    function handleAction() {
      if (!isGenerated) {
        generateName();
      } else {
        changeSymbolWithAnimation();
      }
    }

    function generateName() {
      const input = document.getElementById('nameInput').value.trim();
      if (input.length === 0 || input.length > 7) {
        alert('Please enter a name with 1вҖ“7 characters.');
        return;
      }

      baseName = `бҙібҙҝбҙ®гғЎ${toSmallCaps(input)}`;
      currentSymbol = getRandomSymbol();
      updateResult();
      isGenerated = true;
      document.getElementById('actionBtn').innerText = 'вҷ»пёҸ';
    }

    function changeSymbolWithAnimation() {
      const symbolSpan = document.querySelector('#result .symbol');
      if (!symbolSpan) return;

      symbolSpan.classList.add('fade-out');

      // Remove existing animationend listener if any by cloning node
      const newSymbolSpan = symbolSpan.cloneNode(true);
      symbolSpan.parentNode.replaceChild(newSymbolSpan, symbolSpan);

      newSymbolSpan.addEventListener('animationend', () => {
        newSymbolSpan.classList.remove('fade-out');

        currentSymbol = getRandomSymbol();
        newSymbolSpan.textContent = currentSymbol;

        newSymbolSpan.classList.add('fade-in');

        newSymbolSpan.addEventListener('animationend', () => {
          newSymbolSpan.classList.remove('fade-in');
        }, { once: true });
      }, { once: true });
    }

    function updateResult() {
      const resultEl = document.getElementById('result');
      resultEl.style.opacity = 1;

      // Clear current result
      resultEl.innerHTML = '';

      // Create spans for base name and symbol
      const baseSpan = document.createElement('span');
      baseSpan.className = 'base-name';
      baseSpan.textContent = baseName;

      const symbolSpan = document.createElement('span');
      symbolSpan.className = 'symbol';
      symbolSpan.textContent = currentSymbol;

      resultEl.appendChild(baseSpan);
      resultEl.appendChild(symbolSpan);
    }

    function getRandomSymbol() {
      return symbols[Math.floor(Math.random() * symbols.length)];
    }

    function copyOutput() {
      if (!isGenerated) return;

      const resultEl = document.getElementById('result');
      const text = resultEl.textContent;
      navigator.clipboard.writeText(text).then(() => {
        showCopiedMessage();
        resetGenerator();
      });
    }

    function resetGenerator() {
      isGenerated = false;
      currentSymbol = '';
      baseName = '';
      const resultEl = document.getElementById('result');
      resultEl.style.opacity = 0;
      resultEl.innerHTML = '';
      document.getElementById('actionBtn').innerText = 'вңЁ';
    }

    function copyInvisible() {
      const invisible = 'г…Ө';
      navigator.clipboard.writeText(invisible).then(() => {
        showCopiedMessage();
      });
    }

    function showCopiedMessage() {
      const msg = document.getElementById('copiedMessage');
      msg.style.display = 'block';
      setTimeout(() => {
        msg.style.display = 'none';
      }, 1200);
    }

    // Listen for input changes to reset button if empty
    document.getElementById('nameInput').addEventListener('input', (e) => {
      if (e.target.value.trim().length === 0) {
        resetGenerator();
      }
    });

    // Copy generated name on click
    document.getElementById('result').addEventListener('click', () => {
      copyOutput();
    });

    // Dark/light theme toggle
    function toggleTheme() {
      if (document.documentElement.getAttribute('data-theme') === 'dark') {
        document.documentElement.removeAttribute('data-theme');
        localStorage.removeItem('theme');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
      }
    }

    // Load saved theme or system preference
    function loadTheme() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else if (savedTheme === 'light') {
        document.documentElement.removeAttribute('data-theme');
      } else {
        // Auto detect system preference
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      }
    }

    loadTheme();
  </script>
</body>
</html>
